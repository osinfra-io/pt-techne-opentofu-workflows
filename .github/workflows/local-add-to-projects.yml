name: Add To GitHub Projects

on:
  issues:
    types:
      - opened
  pull_request:
    types:
      - opened

permissions:
  repository-projects: write

jobs:
  add-to-osinfra-project:
    name: Open Source Infrastructure (as Code)
    uses: osinfra-io/pt-techne-misc-workflows/.github/workflows/add-to-project.yml@ae08e7cb6c920790a5e093f83b778bb9735b2d65  # v0.2.7
    with:
      project_id: 1
    secrets:
      add_to_project_pem: ${{ secrets.ADD_TO_PROJECT_PEM }}
