name: Add To GitHub Projects

on:
  issues:
    types:
      - opened
  pull_request:
    types:
      - opened

permissions:
  repository-projects: write

jobs:
  add-to-osinfra-project:
    name: Open Source Infrastructure (as Code)
    uses: osinfra-io/pt-techne-misc-workflows/.github/workflows/add-to-project.yml@fb82a00e1b162759779a236c3cb057bf3de5b3a9  # v0.2.4
    with:
      project_id: 1
    secrets:
      add_to_project_pem: ${{ secrets.ADD_TO_PROJECT_PEM }}
