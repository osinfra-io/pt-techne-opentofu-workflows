name: Add To GitHub Projects

on:
  issues:
    types:
      - opened
  pull_request:
    types:
      - opened

permissions:
  repository-projects: write

jobs:
  add-to-osinfra-project:
    name: Open Source Infrastructure (as Code)
    uses: osinfra-io/pt-techne-misc-workflows/.github/workflows/add-to-project.yml@3f58f13c9ff1c2c4a94cecad4bab5d3e78d69bce  # v0.2.2
    with:
      project_id: 1
    secrets:
      add_to_project_pem: ${{ secrets.ADD_TO_PROJECT_PEM }}
