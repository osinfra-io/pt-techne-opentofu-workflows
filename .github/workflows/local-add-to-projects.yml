name: Add To GitHub Projects

on:
  issues:
    types:
      - opened
  pull_request:
    types:
      - opened

permissions:
  repository-projects: write

jobs:
  add-to-osinfra-project:
    name: Open Source Infrastructure (as Code)
    uses: osinfra-io/pt-techne-misc-workflows/.github/workflows/add-to-project.yml@7ed8c49dde7d72864db8b10423592c85fc30df80  # v0.2.3
    with:
      project_id: 1
    secrets:
      add_to_project_pem: ${{ secrets.ADD_TO_PROJECT_PEM }}
