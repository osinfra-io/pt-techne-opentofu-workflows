name: Add To GitHub Projects

on:
  issues:
    types:
      - opened
  pull_request:
    types:
      - opened

permissions:
  repository-projects: write

jobs:
  add-to-osinfra-project:
    name: Open Source Infrastructure (as Code)
    uses: osinfra-io/pt-techne-misc-workflows/.github/workflows/add-to-project.yml@818472b2b39a5a5d2a8108e63b7a93a4adbe999a  # v0.2.6
    with:
      project_id: 1
    secrets:
      add_to_project_pem: ${{ secrets.ADD_TO_PROJECT_PEM }}
