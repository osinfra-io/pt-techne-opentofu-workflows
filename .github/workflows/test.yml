name: Test Called Workflow

on:
  workflow_call:
    inputs:
      opentofu_test_args:
        description: "Additional arguments to pass to the tofu test command"
        required: false
        type: string
        default: ""
      opentofu_test_verbose:
        description: "Whether to run tofu test with verbose output"
        required: false
        type: boolean
        default: false
      opentofu_version:
        description: "The version of OpenTofu to use"
        required: true
        type: string
      working_directory:
        description: "The working directory containing the OpenTofu configuration to test"
        required: false
        type: string
        default: .

      # Uncomment if you have private modules

      # ssh_key:
      #   required: true

    secrets:
      opentofu_test_secret_args:
        description: "Additional secret arguments to pass to the tofu test command"
        required: false

permissions:
  contents: read

# If you use private modules, you'll need this env variable to use
# the same ssh-agent socket value across all jobs & steps.

# env:
#  SSH_AUTH_SOCK: /tmp/ssh_agent.sock

jobs:
  test:
    name: OpenTofu
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      # GitHub - Checkout
      # https://github.com/marketplace/actions/checkout

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # GitHub - Setup SSH for private module access
      # Uncomment if you have private modules

      # - name: Private module access
      #   run: |
      #     ssh-agent -a $SSH_AUTH_SOCK
      #     mkdir -p ~/.ssh
      #     echo "${{ secrets.ssh_key }}" | tr -d '\r' | ssh-add -
      #     ssh-keyscan github.com >> ~/.ssh/known_hosts

      # Setup OpenTofu
      # https://github.com/marketplace/actions/opentofu-setup-tofu

      - name: OpenTofu setup
        uses: opentofu/setup-opentofu@fc711fa910b93cba0f3fbecaafc9f42fd0c411cb # v2.0.0
        with:
          tofu_version: ${{ inputs.opentofu_version }}

      - name: OpenTofu format
        run: tofu fmt -check -diff

      - name: OpenTofu initialize
        run: tofu init

      - name: OpenTofu validate
        run: tofu validate

      - name: OpenTofu test
        id: test
        run: |
          tofu test --verbose=${{ inputs.opentofu_test_verbose }} -no-color ${{ inputs.opentofu_test_args }} ${{ secrets.opentofu_test_secret_args }}

      - name: OpenTofu summary
        continue-on-error: true
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          OPENTOFU_OUTPUT: ${{ steps.test.outputs.stdout }}
        with:
          script: |
            const output = process.env.OPENTOFU_OUTPUT || '';

            const errorMatch = output.match(/Error:.+/);

            // Parse per-runresults: track current file, then match run lines
            const runs = [];
            let currentFile = '';
            for (const line of output.split('\n')) {
              const fileMatch = line.match(/^(\S+\.tftest\.hcl)\.\.\./);
              const runMatch  = line.match(/^\s+run "(.+)"\.\.\. (pass|fail)/);
              if (fileMatch) currentFile = fileMatch[1];
              if (runMatch)  runs.push({ file: currentFile, run: runMatch[1], result: runMatch[2] });
            }

            const lines = [
              '#### 🔨 OpenTofu Test',
              '',
            ];

            if (runs.length) {
              lines.push('| Result | File | Run |', '|---|---|---|');
              for (const r of runs) {
                const icon = r.result === 'pass' ? '✅' : '❌';
                lines.push(`| ${icon} | \`${r.file}\` | \`${r.run}\` |`);
              }
              lines.push('');
            }

            if (errorMatch) {
              lines.push(`> ❌ ${errorMatch[0]}`, '');
            }

            lines.push(
              '<details>',
              '<summary>Full Test Output</summary>',
              '',
              '```hcl',
              output,
              '```',
              '',
              '</details>',
            );

            await core.summary.addRaw(lines.join('\n')).write();
