name: Test Called Workflow

on:
  workflow_call:
    inputs:
      opentofu_test_args:
        description: "Additional arguments to pass to the tofu test command"
        required: false
        type: string
        default: ""
      opentofu_test_verbose:
        description: "Whether to run tofu test with verbose output"
        required: false
        type: boolean
        default: false
      opentofu_version:
        description: "The version of OpenTofu to use"
        required: true
        type: string
      working_directory:
        description: "The working directory containing the OpenTofu configuration to test"
        required: false
        type: string
        default: .

      # Uncomment if you have private modules

      # ssh_key:
      #   required: true

    secrets:
      opentofu_test_secret_args:
        description: "Additional secret arguments to pass to the tofu test command"
        required: false

permissions:
  contents: read

# If you use private modules, you'll need this env variable to use
# the same ssh-agent socket value across all jobs & steps.

# env:
#  SSH_AUTH_SOCK: /tmp/ssh_agent.sock

jobs:
  test:
    name: OpenTofu
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      # GitHub - Checkout
      # https://github.com/marketplace/actions/checkout

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # GitHub - Setup SSH for private module access
      # Uncomment if you have private modules

      # - name: Private module access
      #   run: |
      #     ssh-agent -a $SSH_AUTH_SOCK
      #     mkdir -p ~/.ssh
      #     echo "${{ secrets.ssh_key }}" | tr -d '\r' | ssh-add -
      #     ssh-keyscan github.com >> ~/.ssh/known_hosts

      # Setup OpenTofu
      # https://github.com/marketplace/actions/opentofu-setup-tofu

      - name: OpenTofu setup
        uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2.0.1
        with:
          tofu_version: ${{ inputs.opentofu_version }}

      - name: OpenTofu format
        run: tofu fmt -check -diff

      - name: OpenTofu initialize
        run: tofu init

      - name: OpenTofu validate
        run: tofu validate

      - name: OpenTofu test
        id: test
        continue-on-error: true
        shell: bash
        run: |
          set +e
          tofu test --verbose=${{ inputs.opentofu_test_verbose }} -no-color ${{ inputs.opentofu_test_args }} ${{ secrets.opentofu_test_secret_args }} 2>&1 | tee "$RUNNER_TEMP/tofu-test.txt"
          exit ${PIPESTATUS[0]}

      - name: OpenTofu summary
        if: always()
        continue-on-error: true
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const outputFile = `${process.env.RUNNER_TEMP}/tofu-test.txt`;
            const output = fs.existsSync(outputFile) ? fs.readFileSync(outputFile, 'utf8') : '';
            if (!output.trim()) { return; }
            const escape = (s) => String(s).replace(/[`|\\]/g, '\\$&');
            const errorMatch = output.match(/Error:.+/);
            const runs = [];
            let currentFile = '';
            for (const line of output.split('\n')) {
              const fileMatch = line.match(/^(\S+\.tftest\.hcl)\.\.\./);
              const runMatch  = line.match(/^\s+run "(.+)"\.\.\. (pass|fail)/);
              if (fileMatch) currentFile = fileMatch[1];
              if (runMatch && currentFile) runs.push({ file: currentFile, run: runMatch[1], result: runMatch[2] });
            }
            const logo = '<picture><source media="(prefers-color-scheme: dark)" srcset="https://raw.githubusercontent.com/opentofu/brand-artifacts/main/full/transparent/PNG/on-dark.png"><img src="https://raw.githubusercontent.com/opentofu/brand-artifacts/main/full/transparent/PNG/on-light.png" height="24"></picture>';
            const lines = [logo, ''];
            if (runs.length) {
              lines.push('| Result | File | Run |', '|---|---|---|');
              for (const r of runs) {
                const icon = r.result === 'pass' ? '✅' : '❌';
                lines.push(`| ${icon} | \`${escape(r.file)}\` | \`${escape(r.run)}\` |`);
              }
              lines.push('');
            }
            if (errorMatch) { lines.push(`> ❌ ${errorMatch[0]}`, ''); }
            lines.push('<details>', '<summary>Full Test Output</summary>', '', '```hcl', output, '```', '', '</details>');
            await core.summary.addRaw(lines.join('\n')).write();

      - name: OpenTofu test result
        if: steps.test.outcome == 'failure'
        run: exit 1
