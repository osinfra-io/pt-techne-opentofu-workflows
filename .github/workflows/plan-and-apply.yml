name: Plan and Apply Called Workflow

on:
  workflow_call:
    inputs:
      checkout_ref:
        description: "The git ref to checkout for the deployment"
        required: false
        type: string
      github_environment:
        description: "The GitHub environment to deploy to (sandbox, non-production, production)"
        required: true
        type: string
      opentofu_kms_encryption_key:
        description: "The KMS key used to encrypt OpenTofu state"
        required: true
        type: string
      opentofu_plan_args:
        description: "Additional arguments to pass to the tofu plan command"
        required: false
        type: string
        default: ""
      opentofu_state_bucket:
        description: "The GCS bucket used for OpenTofu state storage"
        required: true
        type: string
      opentofu_version:
        description: "The version of OpenTofu to use"
        required: true
        type: string
      opentofu_workspace:
        description: "The OpenTofu workspace to select"
        required: true
        type: string
      service_account:
        description: "The GCP service account to impersonate for the deployment"
        required: true
        type: string
      working_directory:
        description: "The working directory containing the OpenTofu configuration"
        required: false
        type: string
        default: .
      workload_identity_provider:
        description: "The GCP Workload Identity Provider for OIDC authentication"
        required: true
        type: string

    secrets:
      # Uncomment if you have private modules

      # ssh_key:
      #   required: true

      opentofu_plan_secret_args:
        description: "Additional secret arguments to pass to the tofu plan command"
        required: false

permissions:
  contents: read
  id-token: write

env:
  # Early variable evaluation required for backend and provider configuration

  TF_VAR_state_bucket: ${{ inputs.opentofu_state_bucket }}
  TF_VAR_state_kms_encryption_key: ${{ inputs.opentofu_kms_encryption_key }}
  TF_VAR_state_prefix: ${{ github.event.repository.name }}

  # If you use private modules you'll need this env variable to use
  # the same ssh-agent socket value across all jobs & steps.

  # SSH_AUTH_SOCK: /tmp/ssh_agent.sock

jobs:
  plan:
    name: OpenTofu plan
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      # GitHub - Checkout
      # https://github.com/marketplace/actions/checkout

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.checkout_ref }}

      # GitHub - Cache
      # https://github.com/marketplace/actions/cache

      - name: Setup cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ${{ inputs.working_directory }}/.terraform
            ${{ inputs.working_directory }}/.terraform.lock.hcl
            ${{ inputs.working_directory }}/plan.out
          key: ${{ inputs.opentofu_workspace }}-${{ github.run_id }}-${{ github.run_attempt }}

      # Google Cloud Platform - Authenticate to Google Cloud
      # https://github.com/marketplace/actions/authenticate-to-google-cloud

      - name: Authenticate
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          create_credentials_file: true
          service_account: ${{ inputs.service_account }}
          workload_identity_provider: ${{ inputs.workload_identity_provider }}

      # GitHub - Setup SSH for private module access
      # Uncomment if you have private modules

      # - name: Private module access
      #   run: |
      #     ssh-agent -a $SSH_AUTH_SOCK
      #     mkdir -p ~/.ssh
      #     echo "${{ secrets.ssh_key }}" | tr -d '\r' | ssh-add -
      #     ssh-keyscan github.com >> ~/.ssh/known_hosts

      # Setup OpenTofu
      # https://github.com/marketplace/actions/opentofu-setup-tofu

      - name: OpenTofu setup
        uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2.0.1
        with:
          tofu_version: ${{ inputs.opentofu_version }}

      - name: OpenTofu format
        run: tofu fmt -check -diff

      - name: OpenTofu initialize
        run: tofu init

      - name: OpenTofu workspace
        run: >-
          tofu workspace select -or-create ${{ inputs.opentofu_workspace }}

      - name: OpenTofu validate
        run: tofu validate

      - name: OpenTofu plan
        id: plan
        run: |
          set +e
          tofu plan -detailed-exitcode -input=false -out=plan.out ${{ inputs.opentofu_plan_args }} ${{ secrets.opentofu_plan_secret_args }}
          exitcode=$?
          echo "exitcode=$exitcode" >> $GITHUB_OUTPUT
          if [ $exitcode -eq 1 ]; then exit 1; fi

      - name: OpenTofu show
        id: show
        run: tofu show -no-color plan.out | tee "$RUNNER_TEMP/tofu-show.txt"

      - name: OpenTofu summary
        if: always()
        continue-on-error: true
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const outputFile = `${process.env.RUNNER_TEMP}/tofu-show.txt`;
            const output = fs.existsSync(outputFile) ? fs.readFileSync(outputFile, 'utf8') : '';
            if (!output.trim()) { return; }
            const planMatch = output.match(/Plan: (\d+) to add, (\d+) to change, (\d+) to destroy/);
            const errorMatch = output.match(/Error:.+/);
            const logo = '<picture><source media="(prefers-color-scheme: dark)" srcset="https://raw.githubusercontent.com/opentofu/brand-artifacts/main/full/transparent/PNG/on-dark.png"><img src="https://raw.githubusercontent.com/opentofu/brand-artifacts/main/full/transparent/PNG/on-light.png" height="24"></picture>';
            const lines = [logo, ''];
            if (planMatch) {
              lines.push('| ➕ Add | 🔄 Change | 🗑️ Destroy |', '|---|---|---|');
              lines.push(`| ${planMatch[1]} | ${planMatch[2]} | ${planMatch[3]} |`, '');
            } else if (!errorMatch) {
              lines.push('**✅ No changes.** Your infrastructure matches the configuration.', '');
            }
            if (errorMatch) { lines.push(`> ❌ ${errorMatch[0]}`, ''); }
            lines.push('<details>', '<summary>Full Plan Output</summary>', '', '```hcl', output, '```', '', '</details>');
            await core.summary.addRaw(lines.join('\n')).write();

    outputs:
      plan-exit-code: ${{ steps.plan.outputs.exitcode }}

  apply:
    name: OpenTofu apply
    needs: plan
    if: needs.plan.outputs.plan-exit-code == '2'
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.github_environment }}

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      # GitHub - Checkout
      # https://github.com/marketplace/actions/checkout

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.checkout_ref }}

      # Google Cloud Platform - Authenticate to Google Cloud
      # https://github.com/marketplace/actions/authenticate-to-google-cloud

      - name: Authenticate
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          create_credentials_file: true
          service_account: ${{ inputs.service_account }}
          workload_identity_provider: ${{ inputs.workload_identity_provider }}

      # GitHub - Setup SSH for private module access
      # Uncomment if you have private modules

      # - name: Private module access
      #   run: |
      #     ssh-agent -a $SSH_AUTH_SOCK
      #     mkdir -p ~/.ssh
      #     echo "${{ secrets.ssh_key }}" | tr -d '\r' | ssh-add -
      #     ssh-keyscan github.com >> ~/.ssh/known_hosts

      # GitHub - Cache
      # https://github.com/marketplace/actions/cache

      - name: Restore cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          fail-on-cache-miss: true
          path: |
            ${{ inputs.working_directory }}/.terraform
            ${{ inputs.working_directory }}/.terraform.lock.hcl
            ${{ inputs.working_directory }}/plan.out
          key: ${{ inputs.opentofu_workspace }}-${{ github.run_id }}-${{ github.run_attempt }}

      # Setup OpenTofu
      # https://github.com/marketplace/actions/opentofu-setup-tofu

      - name: OpenTofu setup
        uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2.0.1
        with:
          tofu_version: ${{ inputs.opentofu_version }}

      - name: OpenTofu apply
        id: apply
        run: tofu apply -no-color plan.out 2>&1 | tee "$RUNNER_TEMP/tofu-apply.txt"

      - name: OpenTofu summary
        if: always()
        continue-on-error: true
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const outputFile = `${process.env.RUNNER_TEMP}/tofu-apply.txt`;
            const output = fs.existsSync(outputFile) ? fs.readFileSync(outputFile, 'utf8') : '';
            if (!output.trim()) { return; }
            const escape = (s) => String(s).replace(/[`|\\]/g, '\\$&');
            const cell = (s) => escape(String(s).replace(/\r?\n/g, '\\n'));
            const applyMatch = output.match(/Apply complete! Resources: (\d+) added, (\d+) changed, (\d+) destroyed/);
            const errorMatch = output.match(/Error:.+/);
            const started = {}, completed = new Set(), durations = {};
            for (const line of output.split('\n')) {
              const creating   = line.match(/^(.+): Creating\.\.\./);
              const modifying  = line.match(/^(.+): Modifying\.\.\./);
              const destroying = line.match(/^(.+): Destroying\.\.\./);
              const created    = line.match(/^(.+): Creation complete after (\S+)/);
              const modified   = line.match(/^(.+): Modifications complete after (\S+)/);
              const destroy    = line.match(/^(.+): Destruction complete after (\S+)/);
              if (creating)   started[creating[1].trim()]   = 'added';
              if (modifying)  started[modifying[1].trim()]  = 'changed';
              if (destroying) started[destroying[1].trim()] = 'destroyed';
              if (created)  { completed.add(created[1].trim());  durations[created[1].trim()]  = created[2]; }
              if (modified) { completed.add(modified[1].trim()); durations[modified[1].trim()] = modified[2]; }
              if (destroy)  { completed.add(destroy[1].trim());  durations[destroy[1].trim()]  = destroy[2]; }
            }
            const actionOrder = { destroyed: 0, changed: 1, added: 2 };
            const actionLabel = { added: '➕ Add', changed: '🔄 Change', destroyed: '🗑️ Destroy' };
            const rows = Object.entries(started).sort(([, a], [, b]) => actionOrder[a] - actionOrder[b]);
            const logo = '<picture><source media="(prefers-color-scheme: dark)" srcset="https://raw.githubusercontent.com/opentofu/brand-artifacts/main/full/transparent/PNG/on-dark.png"><img src="https://raw.githubusercontent.com/opentofu/brand-artifacts/main/full/transparent/PNG/on-light.png" height="24"></picture>';
            const lines = [logo, ''];
            if (rows.length) {
              lines.push('| Action | Resource | Duration | Status |', '|---|---|---|---|');
              for (const [r, action] of rows) {
                const ok  = completed.has(r);
                const dur = durations[r] ? escape(durations[r]) : '—';
                lines.push(`| ${actionLabel[action]} | \`${escape(r)}\` | ${dur} | ${ok ? '✅' : '❌'} |`);
              }
              lines.push('');
            }
            if (!applyMatch && !errorMatch && !rows.length) {
              lines.push('**✅ No changes.** Your infrastructure matches the configuration.', '');
            }
            if (errorMatch) { lines.push(`> ❌ ${errorMatch[0]}`, ''); }
            const outputsStart = output.indexOf('\nOutputs:\n');
            if (outputsStart !== -1) {
              const outputEntries = [];
              for (const line of output.slice(outputsStart + '\nOutputs:\n'.length).trim().split('\n')) {
                const m = line.match(/^(\S+)\s*=\s*(.+)$/);
                if (m) outputEntries.push({ name: m[1], value: m[2].trim() });
              }
              if (outputEntries.length) {
                lines.push('**Outputs**', '');
                lines.push('| Name | Value |', '|---|---|');
                for (const { name, value } of outputEntries) {
                  lines.push(`| \`${escape(name)}\` | \`${cell(value)}\` |`);
                }
                lines.push('');
              }
            }
            lines.push('<details>', '<summary>Full Apply Output</summary>', '', '```hcl', output, '```', '', '</details>');
            await core.summary.addRaw(lines.join('\n')).write();

