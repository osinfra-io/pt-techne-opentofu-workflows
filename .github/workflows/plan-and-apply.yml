name: Plan and Apply Called Workflow

on:
  workflow_call:
    inputs:
      checkout_ref:
        description: "The git ref to checkout for the deployment"
        required: false
        type: string
      github_environment:
        description: "The GitHub environment to deploy to (sandbox, non-production, production)"
        required: true
        type: string
      opentofu_kms_encryption_key:
        description: "The KMS key used to encrypt OpenTofu state"
        required: true
        type: string
      opentofu_plan_args:
        description: "Additional arguments to pass to the tofu plan command"
        required: false
        type: string
        default: ""
      opentofu_state_bucket:
        description: "The GCS bucket used for OpenTofu state storage"
        required: true
        type: string
      opentofu_var_json:
        description: "JSON object of extra OpenTofu variables to inject; each top-level key becomes TF_VAR_<key> (value JSON-encoded)"
        required: false
        type: string
        default: ""
      opentofu_version:
        description: "The version of OpenTofu to use"
        required: true
        type: string
      opentofu_workspace:
        description: "The OpenTofu workspace to select"
        required: true
        type: string
      passthrough_output:
        description: "Name of a tofu output to expose as this workflow's `passthrough` output (JSON-encoded)"
        required: false
        type: string
        default: ""
      service_account:
        description: "The GCP service account to impersonate for the deployment"
        required: true
        type: string
      working_directory:
        description: "The working directory containing the OpenTofu configuration"
        required: false
        type: string
        default: .
      workload_identity_provider:
        description: "The GCP Workload Identity Provider for OIDC authentication"
        required: true
        type: string

    secrets:
      # Uncomment if you have private modules

      # ssh_key:
      #   required: true

      opentofu_plan_secret_args:
        description: "Additional secret arguments to pass to the tofu plan command"
        required: false

    outputs:
      passthrough:
        description: "JSON-encoded value of the tofu output named by passthrough_output (empty if unset or absent from state)"
        value: ${{ jobs.plan.outputs.passthrough }}

permissions:
  contents: read
  id-token: write

env:
  # Early variable evaluation required for backend and provider configuration

  TF_VAR_state_bucket: ${{ inputs.opentofu_state_bucket }}
  TF_VAR_state_kms_encryption_key: ${{ inputs.opentofu_kms_encryption_key }}
  TF_VAR_state_prefix: ${{ github.event.repository.name }}

  # If you use private modules you'll need this env variable to use
  # the same ssh-agent socket value across all jobs & steps.

  # SSH_AUTH_SOCK: /tmp/ssh_agent.sock

jobs:
  plan:
    name: OpenTofu plan
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      # GitHub - Checkout
      # https://github.com/marketplace/actions/checkout

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.checkout_ref }}

      # GitHub - Cache
      # https://github.com/marketplace/actions/cache

      - name: Setup cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ${{ inputs.working_directory }}/.terraform
            ${{ inputs.working_directory }}/.terraform.lock.hcl
            ${{ inputs.working_directory }}/plan.out
          key: ${{ inputs.opentofu_workspace }}-${{ github.run_id }}-${{ github.run_attempt }}

      # Google Cloud Platform - Authenticate to Google Cloud
      # https://github.com/marketplace/actions/authenticate-to-google-cloud

      - name: Authenticate
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          create_credentials_file: true
          service_account: ${{ inputs.service_account }}
          workload_identity_provider: ${{ inputs.workload_identity_provider }}

      # GitHub - Setup SSH for private module access
      # Uncomment if you have private modules

      # - name: Private module access
      #   run: |
      #     ssh-agent -a $SSH_AUTH_SOCK
      #     mkdir -p ~/.ssh
      #     echo "${{ secrets.ssh_key }}" | tr -d '\r' | ssh-add -
      #     ssh-keyscan github.com >> ~/.ssh/known_hosts

      # Setup OpenTofu
      # https://github.com/marketplace/actions/opentofu-setup-tofu

      - name: OpenTofu setup
        uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2.0.2
        with:
          tofu_version: ${{ inputs.opentofu_version }}
          tofu_wrapper: false

      - name: OpenTofu format
        run: tofu fmt -check -diff

      - name: Inject OpenTofu variables
        if: inputs.opentofu_var_json != ''
        env:
          OPENTOFU_VAR_JSON: ${{ inputs.opentofu_var_json }}
        run: >-
          echo "$OPENTOFU_VAR_JSON"
          | jq -r 'to_entries[] | "TF_VAR_\(.key)=\(.value | tojson)"'
          >> "$GITHUB_ENV"

      - name: OpenTofu initialize
        run: tofu init

      - name: OpenTofu workspace
        env:
          OPENTOFU_WORKSPACE: ${{ inputs.opentofu_workspace }}
        run: >-
          tofu workspace select -or-create "$OPENTOFU_WORKSPACE"

      - name: OpenTofu passthrough output
        id: passthrough
        if: inputs.passthrough_output != ''
        env:
          PASSTHROUGH_OUTPUT: ${{ inputs.passthrough_output }}
        run: >-
          echo "value=$(tofu output -json "$PASSTHROUGH_OUTPUT"
          2>/dev/null | jq -c . || echo '')" >> "$GITHUB_OUTPUT"

      - name: OpenTofu validate
        run: tofu validate

      - name: OpenTofu plan
        id: plan
        env:
          OPENTOFU_PLAN_ARGS: ${{ inputs.opentofu_plan_args }}
          OPENTOFU_PLAN_SECRET_ARGS: ${{ secrets.opentofu_plan_secret_args }}
        shell: bash
        run: |
          set +e
          tofu plan -detailed-exitcode -input=false -out=plan.out $OPENTOFU_PLAN_ARGS $OPENTOFU_PLAN_SECRET_ARGS
          exitcode=$?
          echo "exitcode=${exitcode}" >> $GITHUB_OUTPUT
          if [ $exitcode -eq 1 ]; then
            exit 1
          fi

      - name: OpenTofu show
        id: show
        run: tofu show -no-color plan.out | tee "$RUNNER_TEMP/tofu-show.txt"

      - name: OpenTofu summary
        if: always()
        continue-on-error: true
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const outputFile = `${process.env.RUNNER_TEMP}/tofu-show.txt`;
            const output = fs.existsSync(outputFile) ? fs.readFileSync(outputFile, 'utf8') : '';
            if (!output.trim()) { return; }
            const planMatch = output.match(/Plan: (\d+) to add, (\d+) to change, (\d+) to destroy/);
            const outputsOnlyMatch = output.includes('Changes to Outputs:');
            const errorMatch = output.match(/Error:.+/);
            const logo = '<picture><source media="(prefers-color-scheme: dark)" srcset="https://raw.githubusercontent.com/opentofu/brand-artifacts/main/full/transparent/PNG/on-dark.png"><img src="https://raw.githubusercontent.com/opentofu/brand-artifacts/main/full/transparent/PNG/on-light.png" height="24"></picture>';
            const lines = [logo, ''];
            if (planMatch) {
              lines.push('| ➕ Add | 🔄 Change | 🗑️ Destroy |', '|---|---|---|');
              lines.push(`| ${planMatch[1]} | ${planMatch[2]} | ${planMatch[3]} |`, '');
            } else if (outputsOnlyMatch) {
              lines.push('**📤 Output-only changes.** No infrastructure changes, but output values will be updated.', '');
            } else if (!errorMatch) {
              lines.push('**✅ No changes.** Your infrastructure matches the configuration.', '');
            }
            if (errorMatch) { lines.push(`> ❌ ${errorMatch[0]}`, ''); }
            lines.push('<details>', '<summary>Full Plan Output</summary>', '', '```hcl', output, '```', '', '</details>');
            await core.summary.addRaw(lines.join('\n')).write();

    outputs:
      plan-exit-code: ${{ steps.plan.outputs.exitcode }}
      passthrough: ${{ steps.passthrough.outputs.value }}

  apply:
    name: OpenTofu apply
    needs: plan
    if: needs.plan.outputs.plan-exit-code == '2'
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.github_environment }}

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      # GitHub - Checkout
      # https://github.com/marketplace/actions/checkout

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.checkout_ref }}

      # Google Cloud Platform - Authenticate to Google Cloud
      # https://github.com/marketplace/actions/authenticate-to-google-cloud

      - name: Authenticate
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          create_credentials_file: true
          service_account: ${{ inputs.service_account }}
          workload_identity_provider: ${{ inputs.workload_identity_provider }}

      # GitHub - Setup SSH for private module access
      # Uncomment if you have private modules

      # - name: Private module access
      #   run: |
      #     ssh-agent -a $SSH_AUTH_SOCK
      #     mkdir -p ~/.ssh
      #     echo "${{ secrets.ssh_key }}" | tr -d '\r' | ssh-add -
      #     ssh-keyscan github.com >> ~/.ssh/known_hosts

      # GitHub - Cache
      # https://github.com/marketplace/actions/cache

      - name: Restore cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          fail-on-cache-miss: true
          path: |
            ${{ inputs.working_directory }}/.terraform
            ${{ inputs.working_directory }}/.terraform.lock.hcl
            ${{ inputs.working_directory }}/plan.out
          key: ${{ inputs.opentofu_workspace }}-${{ github.run_id }}-${{ github.run_attempt }}

      # Setup OpenTofu
      # https://github.com/marketplace/actions/opentofu-setup-tofu

      - name: OpenTofu setup
        uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2.0.2
        with:
          tofu_version: ${{ inputs.opentofu_version }}
          tofu_wrapper: false

      - name: OpenTofu apply
        id: apply
        shell: bash
        run: |
          set -o pipefail
          tofu apply -no-color plan.out 2>&1 | tee "$RUNNER_TEMP/tofu-apply.txt"

      - name: OpenTofu summary
        if: always()
        continue-on-error: true
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const outputFile = `${process.env.RUNNER_TEMP}/tofu-apply.txt`;
            const output = fs.existsSync(outputFile) ? fs.readFileSync(outputFile, 'utf8') : '';
            if (!output.trim()) { return; }
            const applyMatch = output.match(/Apply complete! Resources: (\d+) added, (\d+) changed, (\d+) destroyed/);
            const errorMatch = output.match(/Error:.+/);
            const logo = '<picture><source media="(prefers-color-scheme: dark)" srcset="https://raw.githubusercontent.com/opentofu/brand-artifacts/main/full/transparent/PNG/on-dark.png"><img src="https://raw.githubusercontent.com/opentofu/brand-artifacts/main/full/transparent/PNG/on-light.png" height="24"></picture>';
            const lines = [logo, ''];
            if (applyMatch) {
              lines.push(`**✅ Apply complete!** ${applyMatch[1]} added, ${applyMatch[2]} changed, ${applyMatch[3]} destroyed.`, '');
            } else if (errorMatch) {
              const succeeded = (output.match(/Creation complete/g) || []).length
                + (output.match(/Modifications complete/g) || []).length
                + (output.match(/Destruction complete/g) || []).length;
              const failed = (output.match(/Error:/g) || []).length;
              lines.push(`**❌ Apply failed.** ${succeeded} succeeded, ${failed} errored.`, '');
              lines.push(`> ${errorMatch[0]}`, '');
            }
            const outputsStart = output.indexOf('\nOutputs:\n');
            if (outputsStart !== -1) {
              const outputLines = output.slice(outputsStart + '\nOutputs:\n'.length).trim().split('\n');
              const outputEntries = [];
              let current = null;
              for (const line of outputLines) {
                const m = line.match(/^([A-Za-z_][A-Za-z0-9_-]*)\s+=\s+(.*)$/);
                if (m) {
                  if (current) outputEntries.push(current);
                  current = { name: m[1], lines: [m[2]] };
                } else if (current) {
                  current.lines.push(line);
                }
              }
              if (current) outputEntries.push(current);
              if (outputEntries.length) {
                lines.push('**Outputs**', '', '<table>', '<tr><th>Name</th><th>Value</th></tr>');
                for (const { name, lines: vals } of outputEntries) {
                  const value = vals.join('\n');
                  const esc = (s) => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                  if (vals.length === 1) {
                    lines.push(`<tr><td><code>${name}</code></td><td><code>${esc(value)}</code></td></tr>`);
                  } else {
                    lines.push(`<tr><td><code>${name}</code></td><td><details><summary><i>Show value</i></summary><pre>${esc(`${name} = ${value}`)}</pre></details></td></tr>`);
                  }
                }
                lines.push('</table>', '');
              }
            }
            lines.push('<details>', '<summary>Full Apply Output</summary>', '', '```hcl', output, '```', '', '</details>');
            await core.summary.addRaw(lines.join('\n')).write();
