name: Plan and Apply Called Workflow

on:
  workflow_call:
    inputs:
      checkout_ref:
        description: "The git ref to checkout for the deployment"
        required: false
        type: string
      github_environment:
        description: "The GitHub environment to deploy to (sandbox, non-production, production)"
        required: true
        type: string
      opentofu_kms_encryption_key:
        description: "The KMS key used to encrypt OpenTofu state"
        required: true
        type: string
      opentofu_plan_args:
        description: "Additional arguments to pass to the tofu plan command"
        required: false
        type: string
        default: ""
      opentofu_state_bucket:
        description: "The GCS bucket used for OpenTofu state storage"
        required: true
        type: string
      opentofu_version:
        description: "The version of OpenTofu to use"
        required: true
        type: string
      opentofu_workspace:
        description: "The OpenTofu workspace to select"
        required: true
        type: string
      service_account:
        description: "The GCP service account to impersonate for the deployment"
        required: true
        type: string
      working_directory:
        description: "The working directory containing the OpenTofu configuration"
        required: false
        type: string
        default: .
      workload_identity_provider:
        description: "The GCP Workload Identity Provider for OIDC authentication"
        required: true
        type: string

    secrets:
      # Uncomment if you have private modules

      # ssh_key:
      #   required: true

      opentofu_plan_secret_args:
        description: "Additional secret arguments to pass to the tofu plan command"
        required: false

permissions:
  contents: read
  id-token: write

env:
  # Early variable evaluation required for backend and provider configuration

  TF_VAR_state_bucket: ${{ inputs.opentofu_state_bucket }}
  TF_VAR_state_kms_encryption_key: ${{ inputs.opentofu_kms_encryption_key }}
  TF_VAR_state_prefix: ${{ github.event.repository.name }}

  # If you use private modules you'll need this env variable to use
  # the same ssh-agent socket value across all jobs & steps.

  # SSH_AUTH_SOCK: /tmp/ssh_agent.sock

jobs:
  plan:
    name: OpenTofu plan
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      # GitHub - Checkout
      # https://github.com/marketplace/actions/checkout

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.checkout_ref }}

      # GitHub - Cache
      # https://github.com/marketplace/actions/cache

      - name: Setup cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ${{ inputs.working_directory }}/.terraform
            ${{ inputs.working_directory }}/.terraform.lock.hcl
            ${{ inputs.working_directory }}/plan.out
          key: ${{ inputs.opentofu_workspace }}-${{ github.run_id }}-${{ github.run_attempt }}

      # Google Cloud Platform - Authenticate to Google Cloud
      # https://github.com/marketplace/actions/authenticate-to-google-cloud

      - name: Authenticate
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          create_credentials_file: true
          service_account: ${{ inputs.service_account }}
          workload_identity_provider: ${{ inputs.workload_identity_provider }}

      # GitHub - Setup SSH for private module access
      # Uncomment if you have private modules

      # - name: Private module access
      #   run: |
      #     ssh-agent -a $SSH_AUTH_SOCK
      #     mkdir -p ~/.ssh
      #     echo "${{ secrets.ssh_key }}" | tr -d '\r' | ssh-add -
      #     ssh-keyscan github.com >> ~/.ssh/known_hosts

      # Setup OpenTofu
      # https://github.com/marketplace/actions/opentofu-setup-tofu

      - name: OpenTofu setup
        uses: opentofu/setup-opentofu@fc711fa910b93cba0f3fbecaafc9f42fd0c411cb # v2.0.0
        with:
          tofu_version: ${{ inputs.opentofu_version }}

      - name: OpenTofu format
        run: tofu fmt -check -diff

      - name: OpenTofu initialize
        run: tofu init

      - name: OpenTofu workspace
        run: >-
          tofu workspace select -or-create ${{ inputs.opentofu_workspace }}

      - name: OpenTofu validate
        run: tofu validate

      - name: OpenTofu plan
        id: plan
        run: |
          tofu plan -detailed-exitcode -input=false -out=plan.out -json-into=plan.json ${{ inputs.opentofu_plan_args }} ${{ secrets.opentofu_plan_secret_args }}

      - name: OpenTofu show
        id: show
        run: tofu show -no-color plan.out

      - name: OpenTofu summary
        if: always()
        continue-on-error: true
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          OPENTOFU_OUTPUT: ${{ steps.show.outputs.stdout }}
        with:
          script: |
            const output = process.env.OPENTOFU_OUTPUT || '';

            const planMatch = output.match(/Plan: (\d+) to add, (\d+) to change, (\d+) to destroy/);
            const errorMatch = output.match(/Error:.+/);

            const toAdd = [];
            const toChange = [];
            const toDestroy = [];

            for (const line of output.split('\n')) {
              const m = line.match(/# (.+) will be (created|destroyed|updated in-place)/);
              const r = line.match(/# (.+) must be replaced/);
              if (m) {
                if (m[2] === 'created') toAdd.push(m[1]);
                else if (m[2] === 'destroyed') toDestroy.push(m[1]);
                else if (m[2] === 'updated in-place') toChange.push(m[1]);
              } else if (r) {
                toChange.push(r[1]);
              }
            }

            const lines = ['### 🔨 OpenTofu Plan', ''];

            if (toDestroy.length || toChange.length || toAdd.length) {
              lines.push('| Action | Resource |', '|---|---|');
              for (const r of toDestroy) lines.push(`| 🗑️ | \`${r}\` |`);
              for (const r of toChange)  lines.push(`| 🔄 | \`${r}\` |`);
              for (const r of toAdd)     lines.push(`| ➕ | \`${r}\` |`);
              lines.push('');
            }

            if (!planMatch && !errorMatch) {
              lines.push('**✅ No changes.** Your infrastructure matches the configuration.', '');
            }

            if (errorMatch) {
              lines.push(`> ❌ ${errorMatch[0]}`, '');
            }

            lines.push(
              '<details>',
              '<summary>Full Plan Output</summary>',
              '',
              '```hcl',
              output,
              '```',
              '',
              '</details>',
            );

            await core.summary.addRaw(lines.join('\n')).write();

      # GitHub - Upload Artifact
      # https://github.com/marketplace/actions/upload-a-build-artifact

      - name: Upload plan JSON
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: opentofu-plan-${{ inputs.opentofu_workspace }}
          path: ${{ inputs.working_directory }}/plan.json
          retention-days: 7

    outputs:
      plan-exit-code: ${{ steps.plan.outputs.exitcode }}

  apply:
    name: OpenTofu apply
    needs: plan
    if: needs.plan.outputs.plan-exit-code == 2
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.github_environment }}

    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}

    steps:
      # GitHub - Checkout
      # https://github.com/marketplace/actions/checkout

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.checkout_ref }}

      # Google Cloud Platform - Authenticate to Google Cloud
      # https://github.com/marketplace/actions/authenticate-to-google-cloud

      - name: Authenticate
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          create_credentials_file: true
          service_account: ${{ inputs.service_account }}
          workload_identity_provider: ${{ inputs.workload_identity_provider }}

      # GitHub - Setup SSH for private module access
      # Uncomment if you have private modules

      # - name: Private module access
      #   run: |
      #     ssh-agent -a $SSH_AUTH_SOCK
      #     mkdir -p ~/.ssh
      #     echo "${{ secrets.ssh_key }}" | tr -d '\r' | ssh-add -
      #     ssh-keyscan github.com >> ~/.ssh/known_hosts

      # GitHub - Cache
      # https://github.com/marketplace/actions/cache

      - name: Restore cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          fail-on-cache-miss: true
          path: |
            ${{ inputs.working_directory }}/.terraform
            ${{ inputs.working_directory }}/.terraform.lock.hcl
            ${{ inputs.working_directory }}/plan.out
          key: ${{ inputs.opentofu_workspace }}-${{ github.run_id }}-${{ github.run_attempt }}

      # Setup OpenTofu
      # https://github.com/marketplace/actions/opentofu-setup-tofu

      - name: OpenTofu setup
        uses: opentofu/setup-opentofu@fc711fa910b93cba0f3fbecaafc9f42fd0c411cb # v2.0.0
        with:
          tofu_version: ${{ inputs.opentofu_version }}

      - name: OpenTofu apply
        id: apply
        run: tofu apply -no-color -json-into=apply.json plan.out

      - name: OpenTofu summary
        if: always()
        continue-on-error: true
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          OPENTOFU_OUTPUT: ${{ steps.apply.outputs.stdout }}
        with:
          script: |
            const output = process.env.OPENTOFU_OUTPUT || '';

            const applyMatch = output.match(/Apply complete! Resources: (\d+) added, (\d+) changed, (\d+) destroyed/);
            const errorMatch = output.match(/Error:.+/);

            // Track resources that started and those that completed
            const started = {};
            const completed = new Set();

            for (const line of output.split('\n')) {
              const creating   = line.match(/^(.+): Creating\.\.\./);
              const modifying  = line.match(/^(.+): Modifying\.\.\./);
              const destroying = line.match(/^(.+): Destroying\.\.\./);
              const created    = line.match(/^(.+): Creation complete/);
              const modified   = line.match(/^(.+): Modifications complete/);
              const destroy    = line.match(/^(.+): Destruction complete/);
              if (creating)   started[creating[1].trim()]   = 'added';
              if (modifying)  started[modifying[1].trim()]  = 'changed';
              if (destroying) started[destroying[1].trim()] = 'destroyed';
              if (created)    completed.add(created[1].trim());
              if (modified)   completed.add(modified[1].trim());
              if (destroy)    completed.add(destroy[1].trim());
            }

            const actionOrder = { destroyed: 0, changed: 1, added: 2 };
            const actionEmoji = { added: '➕', changed: '🔄', destroyed: '🗑️' };

            const rows = Object.entries(started).sort(([, a], [, b]) => actionOrder[a] - actionOrder[b]);

            const lines = ['### 🚀 OpenTofu Apply', ''];

            if (rows.length) {
              lines.push('| Action | Resource | Status |', '|---|---|---|');
              for (const [r, action] of rows) {
                const ok = completed.has(r);
                lines.push(`| ${actionEmoji[action]} | \`${r}\` | ${ok ? '✅' : '❌'} |`);
              }
              lines.push('');
            }

            if (!applyMatch && !errorMatch && !rows.length) {
              lines.push('**✅ No changes.** Your infrastructure matches the configuration.', '');
            }

            if (errorMatch) {
              lines.push(`> ❌ ${errorMatch[0]}`, '');
            }

            lines.push(
              '<details>',
              '<summary>Full Apply Output</summary>',
              '',
              '```hcl',
              output,
              '```',
              '',
              '</details>',
            );

            await core.summary.addRaw(lines.join('\n')).write();

      # GitHub - Upload Artifact
      # https://github.com/marketplace/actions/upload-a-build-artifact

      - name: Upload apply JSON
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: opentofu-apply-${{ inputs.opentofu_workspace }}
          path: ${{ inputs.working_directory }}/apply.json
          retention-days: 7
